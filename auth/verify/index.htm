<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Verify Email — Profynex</title>
    <meta name="description" content="Verify your email address to activate your Profynex account." />
    <meta name="theme-color" content="#1d4ed8" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="https://chatgpt.com/s/m_6a4d246c534c8191afe2457aaf66cab7" />
    <link rel="apple-touch-icon" href="https://chatgpt.com/s/m_6a4d246c534c8191afe2457aaf66cab7" />
    <link rel="shortcut icon" href="https://chatgpt.com/s/m_6a4d246c534c8191afe2457aaf66cab7" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    boxShadow: {
                        soft: '0 18px 50px rgba(15, 23, 42, 0.08)',
                        glow: '0 20px 60px rgba(37, 99, 235, 0.18)',
                        'glow-lg': '0 30px 80px rgba(37, 99, 235, 0.25)',
                        'card': '0 25px 80px rgba(15,23,42,0.12)',
                        'input': '0 0 0 3px rgba(37,99,235,0.15)',
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#0f172a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* ── CSS Variables for Theme ── */
        :root {
            --bg: #f7f9ff;
            --panel: rgba(255, 255, 255, 0.85);
            --border: rgba(226, 232, 240, 0.95);
            --text: #0f172a;
            --text-muted: #475569;
            --card-bg: #ffffff;
            --card-border: rgba(226, 232, 240, 0.9);
            --shadow-color: rgba(15, 23, 42, 0.06);
            --border-light: rgba(226, 232, 240, 0.8);
            --form-bg: rgba(255, 255, 255, 0.88);
            --login-wrapper-bg: rgba(255, 255, 255, 0.75);
        }

        [data-theme="dark"] {
            --bg: #0a0e17;
            --panel: rgba(18, 26, 40, 0.92);
            --border: rgba(56, 70, 90, 0.8);
            --text: #e8edf5;
            --text-muted: #94a3b8;
            --card-bg: #121c2e;
            --card-border: rgba(56, 70, 90, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --border-light: rgba(56, 70, 90, 0.6);
            --form-bg: rgba(18, 26, 40, 0.92);
            --login-wrapper-bg: rgba(18, 26, 40, 0.80);
        }

        /* ── Base ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            color: var(--text);
            transition: background 0.4s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ── Login Wrapper ── */
        .login-wrapper {
            display: flex;
            position: relative;
            width: 100%;
            max-width: 980px;
            border-radius: 2.5rem;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.10), 0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            background: var(--login-wrapper-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: box-shadow 0.3s ease, transform 0.3s ease, background 0.4s ease, border-color 0.3s ease;
            min-height: 560px;
        }
        .login-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 40px 100px rgba(15, 23, 42, 0.14), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
        }
        [data-theme="dark"] .login-wrapper {
            border-color: rgba(56, 70, 90, 0.5);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(56, 70, 90, 0.3) inset;
        }
        [data-theme="dark"] .login-wrapper:hover {
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(56, 70, 90, 0.4) inset;
        }

        /* Glow orbs */
        .login-wrapper::before {
            content: '';
            position: absolute;
            top: -80px;
            left: 30%;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .login-wrapper::after {
            content: '';
            position: absolute;
            bottom: -60px;
            right: 20%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.10), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        [data-theme="dark"] .login-wrapper::before {
            background: radial-gradient(circle, rgba(37, 99, 235, 0.08), transparent 70%);
        }
        [data-theme="dark"] .login-wrapper::after {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.06), transparent 70%);
        }

        .login-wrapper>* {
            position: relative;
            z-index: 1;
        }

        /* ── Theme Toggle inside container ── */
        .theme-toggle-container {
            position: absolute;
            top: 18px;
            right: 20px;
            z-index: 20;
        }
        .theme-toggle-inner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--text);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .theme-toggle-inner:hover {
            transform: scale(1.06);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        .theme-toggle-inner:active {
            transform: scale(0.92);
        }
        [data-theme="dark"] .theme-toggle-inner {
            background: var(--panel);
            border-color: var(--border);
            color: var(--text);
        }

        /* ── Image Panel ── */
        .image-panel {
            flex: 1;
            min-width: 0;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
            transform: translateX(-100%);
            transition: transform 0.85s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2.5rem 0 0 2.5rem;
        }
        [data-theme="dark"] .image-panel {
            background: rgba(18, 26, 40, 0.4);
            border-right-color: rgba(56, 70, 90, 0.3);
        }
        .image-panel.open {
            transform: translateX(0);
        }

        .image-panel .image-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.5), rgba(241, 245, 249, 0.3));
        }
        [data-theme="dark"] .image-panel .image-inner {
            background: linear-gradient(145deg, rgba(18, 26, 40, 0.6), rgba(10, 14, 23, 0.4));
        }

        .image-panel .image-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.8s ease;
        }
        .image-panel.open .image-inner img {
            transform: scale(1);
        }

        .image-panel .image-inner .img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(29, 78, 216, 0.08), rgba(99, 102, 241, 0.05));
            pointer-events: none;
        }

        .image-panel .door-handle {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 60px;
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.4), rgba(99, 102, 241, 0.4));
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.6s ease 0.4s;
        }
        [data-theme="dark"] .image-panel .door-handle {
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.5), rgba(99, 102, 241, 0.5));
        }
        .image-panel.open .door-handle {
            opacity: 1;
        }

        .image-panel::before {
            content: '';
            position: absolute;
            right: -2px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.15), rgba(99, 102, 241, 0.10));
            z-index: 3;
            border-radius: 2px 0 0 2px;
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
        }
        .image-panel.open::before {
            opacity: 1;
        }

        /* ── OTP Card ── */
        .otp-card {
            width: 100%;
            max-width: 440px;
            flex-shrink: 0;
            padding: 2.25rem 2rem 2.5rem;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        /* ── Logo ── */
        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .logo-icon {
            display: flex;
            height: 48px;
            width: 48px;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: #fff;
            font-weight: 900;
            font-size: 1.5rem;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.25);
            transition: transform 0.3s ease;
            overflow: hidden;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-icon:hover {
            transform: scale(1.05);
        }
        .logo-text {
            font-size: 1.65rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--text);
            transition: color 0.3s ease;
        }
        .logo-text span {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ── OTP Input ── */
        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 8px 0 4px;
        }
        .otp-input-group .otp-box {
            width: 52px;
            height: 60px;
            border-radius: 14px;
            border: 2px solid var(--border-light);
            background: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            color: var(--text);
            transition: all 0.2s ease;
            outline: none;
            caret-color: #2563eb;
        }
        [data-theme="dark"] .otp-input-group .otp-box {
            background: rgba(18, 26, 40, 0.6);
        }
        .otp-input-group .otp-box:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
            background: rgba(255, 255, 255, 0.85);
        }
        [data-theme="dark"] .otp-input-group .otp-box:focus {
            background: rgba(18, 26, 40, 0.85);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        .otp-input-group .otp-box.error {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.04);
            animation: shake 0.5s ease forwards;
        }
        [data-theme="dark"] .otp-input-group .otp-box.error {
            background: rgba(248, 113, 113, 0.06);
        }
        .otp-input-group .otp-box.filled {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.04);
        }
        [data-theme="dark"] .otp-input-group .otp-box.filled {
            background: rgba(52, 211, 153, 0.06);
        }

        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            10% {
                transform: translateX(-8px);
            }
            30% {
                transform: translateX(8px);
            }
            50% {
                transform: translateX(-6px);
            }
            70% {
                transform: translateX(6px);
            }
            90% {
                transform: translateX(-3px);
            }
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 6px;
            transition: color 0.3s ease;
        }

        /* ── Button ── */
        .btn-verify {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(37, 99, 235, 0.25);
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }
        .btn-verify:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 16px 48px rgba(37, 99, 235, 0.35);
        }
        .btn-verify:active {
            transform: scale(0.97);
        }
        .btn-verify:disabled {
            opacity: 0.7;
            pointer-events: none;
            transform: scale(0.98);
        }
        .btn-verify .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-verify.loading .spinner {
            display: inline-block;
        }
        .btn-verify.loading .btn-text {
            display: none;
        }
        .btn-verify.loading .btn-icon {
            display: none;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-resend {
            background: none;
            border: none;
            color: #1d4ed8;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.2s ease;
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            padding: 0;
        }
        .btn-resend:hover {
            color: #2563eb;
            text-decoration: underline;
        }
        .btn-resend:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            text-decoration: none;
        }
        [data-theme="dark"] .btn-resend {
            color: #60a5fa;
        }
        [data-theme="dark"] .btn-resend:hover {
            color: #93c5fd;
        }

        /* ── iOS Notification ── */
        #notifPopupContainer {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 400px;
            width: 100%;
            pointer-events: none;
        }
        #notifPopupContainer .ios-notification {
            pointer-events: auto;
            animation: notifSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.18), 0 2px 10px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255,
                    0.7);
            cursor: default;
            opacity: 0;
            transform: translateX(40px) scale(0.95);
        }
        #notifPopupContainer .ios-notification.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
        #notifPopupContainer .ios-notification.hiding {
            animation: notifSlideOut 0.4s ease forwards;
        }
        @keyframes notifSlideIn {
            0% {
                opacity: 0;
                transform: translateX(40px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }
        @keyframes notifSlideOut {
            0% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(40px) scale(0.92);
            }
        }
        #notifPopupContainer .ios-notification .notif-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
            transition: color 0.2s;
            flex-shrink: 0;
            margin-left: 4px;
        }
        #notifPopupContainer .ios-notification .notif-close:hover {
            color: #555;
        }

        @media (max-width: 640px) {
            #notifPopupContainer {
                top: 70px;
                right: 8px;
                left: 8px;
                max-width: 100%;
                width: auto;
            }
            #notifPopupContainer .ios-notification {
                min-width: unset;
                max-width: 100%;
                width: 100%;
                padding: 12px 14px;
                border-radius: 18px;
            }
            #notifPopupContainer .ios-notification .notif-icon {
                width: 36px;
                height: 36px;
                font-size: 14px;
                flex-shrink: 0;
            }
            #notifPopupContainer .ios-notification .notif-title {
                font-size: 13px;
            }
            #notifPopupContainer .ios-notification .notif-body {
                font-size: 12px;
            }
            #notifPopupContainer .ios-notification .notif-time {
                font-size: 10px;
            }
            #notifPopupContainer .ios-notification .notif-close {
                font-size: 14px;
            }
        }

        .ios-notification {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(28px) saturate(1.1);
            -webkit-backdrop-filter: blur(28px) saturate(1.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 22px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12), 0 2px 10px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255, 255, 255,
                    0.7);
            padding: 14px 18px;
            min-width: 280px;
            max-width: 400px;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
        }
        .ios-notification .notif-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .ios-notification .notif-icon.emerald {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .ios-notification .notif-icon.rose {
            background: linear-gradient(145deg, #f43f5e, #e11d48);
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
        }
        .ios-notification .notif-icon.slate {
            background: linear-gradient(145deg, #64748b, #475569);
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.3);
        }
        .ios-notification .notif-icon.amber {
            background: linear-gradient(145deg, #f59e0b, #d97706);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        .ios-notification .notif-content {
            flex: 1;
            min-width: 0;
        }
        .ios-notification .notif-title {
            font-size: 14px;
            font-weight: 600;
            color: #0a0a0a;
            line-height: 1.3;
        }
        .ios-notification .notif-body {
            font-size: 13px;
            color: #3a3a3a;
            line-height: 1.35;
            font-weight: 400;
        }
        .ios-notification .notif-time {
            font-size: 11px;
            color: #888;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        [data-theme="dark"] .ios-notification {
            background: rgba(18, 28, 46, 0.92);
            border-color: rgba(56, 70, 90, 0.4);
        }
        [data-theme="dark"] .ios-notification .notif-title {
            color: #e8edf5;
        }
        [data-theme="dark"] .ios-notification .notif-body {
            color: #94a3b8;
        }
        [data-theme="dark"] .ios-notification .notif-time {
            color: #64748b;
        }
        [data-theme="dark"] .ios-notification .notif-close {
            color: #94a3b8;
        }
        [data-theme="dark"] .ios-notification .notif-close:hover {
            color: #e8edf5;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .otp-card {
                padding: 1.75rem 1.25rem 2rem;
            }
            .logo-text {
                font-size: 1.4rem;
            }
            .logo-icon {
                height: 42px;
                width: 42px;
                font-size: 1.3rem;
            }
            .theme-toggle-container {
                top: 12px;
                right: 14px;
            }
            .theme-toggle-inner {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .otp-input-group .otp-box {
                width: 40px;
                height: 48px;
                font-size: 1.2rem;
                border-radius: 10px;
            }
            .otp-input-group {
                gap: 6px;
            }
        }

        @media (min-width: 769px) {
            .login-wrapper {
                min-height: 560px;
            }
            .image-panel {
                flex: 1;
                min-width: 0;
                display: block;
            }
            .otp-card {
                max-width: 440px;
            }
        }

        @media (max-width: 768px) {
            .login-wrapper {
                max-width: 440px;
                min-height: auto;
                border-radius: 2.5rem;
                overflow: hidden;
            }
            .image-panel {
                display: none !important;
            }
            .otp-card {
                max-width: 100%;
                padding: 1.75rem 1.25rem 2rem;
            }
            .login-wrapper::before,
            .login-wrapper::after {
                display: none;
            }
            .theme-toggle-container {
                top: 12px;
                right: 14px;
            }
        }

        /* ── Background blobs ── */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
        }
        .bg-blob-1 {
            top: -10%;
            right: -8%;
            width: 500px;
            height: 500px;
            background: rgba(37, 99, 235, 0.10);
        }
        .bg-blob-2 {
            bottom: -12%;
            left: -6%;
            width: 450px;
            height: 450px;
            background: rgba(99, 102, 241, 0.06);
        }
        [data-theme="dark"] .bg-blob-1 {
            background: rgba(37, 99, 235, 0.06);
        }
        [data-theme="dark"] .bg-blob-2 {
            background: rgba(99, 102, 241, 0.04);
        }
        @media (max-width: 640px) {
            .bg-blob-1 {
                width: 300px;
                height: 300px;
                top: -5%;
            }
            .bg-blob-2 {
                width: 280px;
                height: 280px;
                bottom: -5%;
            }
        }

        /* ── Scrollbar Dark ── */
        [data-theme="dark"] ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        [data-theme="dark"] ::-webkit-scrollbar-track {
            background: #0a0e17;
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb {
            background: #2a3648;
            border-radius: 4px;
        }
        [data-theme="dark"] ::-webkit-scrollbar-thumb:hover {
            background: #3a4a5a;
        }

        /* ── Info text ── */
        .info-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
            transition: color 0.3s ease;
        }
        .info-text .email-highlight {
            font-weight: 600;
            color: var(--text);
            transition: color 0.3s ease;
        }
        [data-theme="dark"] .info-text .email-highlight {
            color: #e8edf5;
        }
    </style>
</head>

<body>

    <!-- ============================================================ -->
    <!-- iOS NOTIFICATION CONTAINER                                    -->
    <!-- ============================================================ -->
    <div id="notifPopupContainer"></div>

    <!-- ============================================================ -->
    <!-- BACKGROUND BLOBS                                              -->
    <!-- ============================================================ -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>

    <!-- ============================================================ -->
    <!-- OTP VERIFICATION WRAPPER                                     -->
    <!-- ============================================================ -->
    <div class="login-wrapper" id="otpWrapper">

        <!-- Theme Toggle — top-right inside container -->
        <div class="theme-toggle-container">
            <button class="theme-toggle-inner" id="themeToggle" aria-label="Toggle theme">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>

        <!-- ============================================================ -->
        <!-- IMAGE PANEL (left) — slides in like a door                   -->
        <!-- ============================================================ -->
        <div class="image-panel" id="imagePanel">
            <div class="door-handle"></div>
            <div class="image-inner">
                <img
                src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="Profynex Email Verification"
                loading="lazy"
                />
                <div class="img-overlay"></div>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- OTP CARD (right)                                             -->
        <!-- ============================================================ -->
        <div class="otp-card">

            <!-- Logo Centered -->
            <div class="flex justify-center mb-5">
                <a href="/" class="logo-link">
                    <div class="logo-icon">
                        <img src="https://chatgpt.com/s/m_6a4d246c534c8191afe2457aaf66cab7" alt="Profynex Logo" />
                    </div>
                    <div class="logo-text">Profy<span>nex</span></div>
                </a>
            </div>

            <!-- Heading -->
            <div class="mb-4">
                <h1 class="text-2xl font-black tracking-tight transition-colors duration-300" style="color:var(--text);">Verify Email</h1>
                <p class="text-sm mt-1 transition-colors duration-300" style="color:var(--text-muted);">We sent a verification code to</p>
                <p class="text-sm font-semibold transition-colors duration-300 mt-0.5" style="color:var(--text);">johndoe@example.com</p>
            </div>

            <!-- Info Text -->
            <p class="info-text mb-4">Enter the 6-character alphanumeric code sent to your email.</p>

            <!-- OTP Input -->
            <form id="otpForm" novalidate autocomplete="off">
                <div class="form-group">
                    <label class="form-label text-center block" for="otpInput">
                        <i class="fas fa-shield-alt text-brand-600 mr-1.5"></i> Verification Code
                    </label>
                    <div class="otp-input-group" id="otpGroup">
                        <input type="text" class="otp-box" id="otp1" maxlength="1" autofocus />
                        <input type="text" class="otp-box" id="otp2" maxlength="1" />
                        <input type="text" class="otp-box" id="otp3" maxlength="1" />
                        <input type="text" class="otp-box" id="otp4" maxlength="1" />
                        <input type="text" class="otp-box" id="otp5" maxlength="1" />
                        <input type="text" class="otp-box" id="otp6" maxlength="1" />
                    </div>
                    <p class="text-xs text-center mt-2 transition-colors duration-300" style="color:var(--text-muted);">
                        <i class="fas fa-info-circle mr-1"></i> Enter the 6-character alphanumeric code
                    </p>
                </div>

                <!-- Verify Button -->
                <button type="submit" class="btn-verify" id="verifyBtn">
                    <span class="btn-icon"><i class="fas fa-check-circle"></i></span>
                    <span class="btn-text">Verify Email</span>
                    <span class="spinner"></span>
                </button>

                <!-- Resend & Back links -->
                <div class="flex items-center justify-between mt-4">
                    <button type="button" class="btn-resend" id="resendBtn">
                        <i class="fas fa-redo-alt mr-1.5"></i> Resend Code
                    </button>
                    <a href="/auth/login/" class="text-sm font-medium transition-colors duration-200" style="color:var(--text-muted);" data-notif="info" data-title="Back to Login" data-msg="Return to the login page.">
                        <i class="fas fa-arrow-left mr-1.5"></i> Back to Login
                    </a>
                </div>
            </form>

            <!-- Bottom note -->
            <div class="text-center mt-6">
                <p class="text-xs transition-colors duration-300" style="color:var(--text-muted);">
                    <i class="fas fa-lock mr-1"></i> Your code expires in <span class="font-semibold" style="color:var(--text);" id="timerDisplay">10:00</span>
                </p>
            </div>

        </div>

    </div>

    <!-- ============================================================ -->
    <!-- SCRIPTS                                                       -->
    <!-- ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // iOS NOTIFICATION SYSTEM
            // ============================================================
            const NotifPopup = {
                container: document.getElementById('notifPopupContainer'),
                maxVisible: 4,

                show(options) {
                    const {
                        icon = 'fa-solid fa-bell',
                            iconColor = '',
                            title = 'Notification',
                            body = '',
                            time = 'Just now',
                            autoDismiss = true,
                            dismissDelay = 4500,
                    } = options;

                    const notif = document.createElement('div');
                    notif.className = 'ios-notification';
                    notif.style.opacity = '0';
                    notif.style.transform = 'translateX(40px) scale(0.95)';

                    const iconClass = iconColor ? `notif-icon ${iconColor}` : 'notif-icon';
                    notif.innerHTML = `
                                <div class="flex items-start gap-3">
                                    <div class="${iconClass}"><i class="${icon}"></i></div>
                                    <div class="notif-content">
                                        <div class="notif-title">${title}</div>
                                        <div class="notif-body">${body}</div>
                                        <div class="flex items-center justify-between mt-1.5">
                                            <span class="notif-time">${time}</span>
                                        </div>
                                    </div>
                                    <button class="notif-close" aria-label="Dismiss">✕</button>
                                </div>
                            `;

                    const closeBtn = notif.querySelector('.notif-close');
                    closeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.dismiss(notif);
                    });

                    notif.addEventListener('click', () => {
                        this.dismiss(notif);
                    });

                    this.container.appendChild(notif);

                    requestAnimationFrame(() => {
                        notif.style.opacity = '1';
                        notif.style.transform = 'translateX(0) scale(1)';
                    });

                    if (autoDismiss) {
                        const timer = setTimeout(() => {
                            this.dismiss(notif);
                        }, dismissDelay);
                        notif._dismissTimer = timer;
                    }

                    this.limitVisible();
                    return notif;
                },

                dismiss(notif) {
                    if (notif._dismissed) return;
                    notif._dismissed = true;
                    clearTimeout(notif._dismissTimer);

                    notif.style.animation = 'notifSlideOut 0.4s ease forwards';
                    setTimeout(() => {
                        if (notif.parentNode) notif.remove();
                    }, 450);
                },

                limitVisible() {
                    const children = this.container.children;
                    while (children.length > this.maxVisible) {
                        const first = children[0];
                        if (first) this.dismiss(first);
                    }
                },

                success(title, body, time) {
                    return this.show({
                        icon: 'fa-solid fa-circle-check',
                        iconColor: 'emerald',
                        title: title || 'Success',
                        body: body || 'Operation completed successfully.',
                        time: time || 'Just now',
                    });
                },

                error(title, body, time) {
                    return this.show({
                        icon: 'fa-solid fa-circle-xmark',
                        iconColor: 'rose',
                        title: title || 'Error',
                        body: body || 'Something went wrong.',
                        time: time || 'Just now',
                    });
                },

                info(title, body, time) {
                    return this.show({
                        icon: 'fa-solid fa-bell',
                        iconColor: 'slate',
                        title: title || 'Info',
                        body: body || 'New update available.',
                        time: time || 'Just now',
                    });
                },

                warning(title, body, time) {
                    return this.show({
                        icon: 'fa-solid fa-triangle-exclamation',
                        iconColor: 'amber',
                        title: title || 'Warning',
                        body: body || 'Please check your input.',
                        time: time || 'Just now',
                    });
                }
            };

            // Attach to elements with data-notif
            document.querySelectorAll('[data-notif]').forEach(function(el) {
                el.addEventListener('click', function(e) {
                    const type = this.dataset.notif || 'info';
                    const title = this.dataset.title || 'Notification';
                    const msg = this.dataset.msg || '';
                    NotifPopup[type] ? NotifPopup[type](title, msg, 'Just now') : NotifPopup.info(title, msg,
                        'Just now');
                });
            });

            // ============================================================
            // THEME TOGGLE
            // ============================================================
            const Theme = {
                toggle: document.getElementById('themeToggle'),
                icon: document.getElementById('themeIcon'),
                current: 'light',

                init() {
                    const saved = localStorage.getItem('profynex_theme');
                    if (saved) {
                        this.current = saved;
                    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        this.current = 'dark';
                    }
                    this.apply(this.current);

                    this.toggle.addEventListener('click', () => {
                        const next = this.current === 'light' ? 'dark' : 'light';
                        this.apply(next);
                    });
                },

                apply(theme) {
                    this.current = theme;
                    document.documentElement.setAttribute('data-theme', theme);
                    localStorage.setItem('profynex_theme', theme);

                    if (theme === 'dark') {
                        this.icon.className = 'fas fa-sun';
                    } else {
                        this.icon.className = 'fas fa-moon';
                    }
                }
            };

            // ============================================================
            // IMAGE PANEL SLIDE-IN
            // ============================================================
            const imagePanel = document.getElementById('imagePanel');

            function openPanel() {
                if (window.innerWidth > 768 && imagePanel) {
                    setTimeout(function() {
                        imagePanel.classList.add('open');
                    }, 400);
                }
            }

            window.addEventListener('load', openPanel);

            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (window.innerWidth > 768 && imagePanel && !imagePanel.classList.contains('open')) {
                        imagePanel.classList.add('open');
                    }
                }, 300);
            });

            // ============================================================
            // OTP INPUT HANDLING
            // ============================================================
            const otpInputs = [
                document.getElementById('otp1'),
                document.getElementById('otp2'),
                document.getElementById('otp3'),
                document.getElementById('otp4'),
                document.getElementById('otp5'),
                document.getElementById('otp6')
            ];
            const otpGroup = document.getElementById('otpGroup');
            const verifyBtn = document.getElementById('verifyBtn');
            const otpForm = document.getElementById('otpForm');
            const resendBtn = document.getElementById('resendBtn');
            const timerDisplay = document.getElementById('timerDisplay');

            let timerInterval = null;
            let timeLeft = 600; // 10 minutes in seconds

            // Focus first input on load
            if (otpInputs[0]) otpInputs[0].focus();

            // Auto-advance / backspace handling
            otpInputs.forEach((input, index) => {
                input.addEventListener('input', function(e) {
                    // Allow only alphanumeric characters
                    this.value = this.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                    // Remove error state
                    this.classList.remove('error');
                    if (this.value.length === 1) {
                        this.classList.add('filled');
                        // Move to next input
                        if (index < otpInputs.length - 1) {
                            otpInputs[index + 1].focus();
                        } else {
                            // Last input - auto-submit after a short delay
                            setTimeout(() => {
                                otpForm.dispatchEvent(new Event('submit'));
                            }, 300);
                        }
                    } else {
                        this.classList.remove('filled');
                    }
                });

                input.addEventListener('keydown', function(e) {
                    // Backspace: move to previous input
                    if (e.key === 'Backspace' && this.value === '' && index > 0) {
                        otpInputs[index - 1].focus();
                        otpInputs[index - 1].classList.remove('filled');
                    }
                    // Left arrow: move to previous
                    if (e.key === 'ArrowLeft' && index > 0) {
                        otpInputs[index - 1].focus();
                    }
                    // Right arrow: move to next
                    if (e.key === 'ArrowRight' && index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                    // Enter: submit
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        otpForm.dispatchEvent(new Event('submit'));
                    }
                });

                // Paste support
                input.addEventListener('paste', function(e) {
                    e.preventDefault();
                    const pasteData = (e.clipboardData || window.clipboardData).getData('text');
                    const cleaned = pasteData.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                    const chars = cleaned.split('').slice(0, otpInputs.length);
                    chars.forEach((char, i) => {
                        if (otpInputs[i]) {
                            otpInputs[i].value = char;
                            otpInputs[i].classList.add('filled');
                            otpInputs[i].classList.remove('error');
                        }
                    });
                    const lastFilled = Math.min(chars.length, otpInputs.length) - 1;
                    if (lastFilled >= 0 && otpInputs[lastFilled + 1]) {
                        otpInputs[lastFilled + 1]?.focus();
                    } else if (chars.length === otpInputs.length) {
                        setTimeout(() => {
                            otpForm.dispatchEvent(new Event('submit'));
                        }, 300);
                    }
                });
            });

            // ============================================================
            // TIMER
            // ============================================================
            function startTimer() {
                timeLeft = 600;
                updateTimerDisplay();
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(function() {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        resendBtn.disabled = false;
                        NotifPopup.warning('Code Expired', 'Your verification code has expired. Please request a new one.',
                            'Just now');
                    }
                }, 1000);
            }

            function updateTimerDisplay() {
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }

            // ============================================================
            // RESEND CODE
            // ============================================================
            resendBtn.addEventListener('click', function() {
                if (this.disabled) return;
                this.disabled = true;
                this.textContent = 'Sending...';

                setTimeout(() => {
                    this.textContent = 'Code Sent!';
                    NotifPopup.success('Code Resent', 'A new verification code has been sent to your email.',
                        'Just now');
                    // Clear OTP fields
                    otpInputs.forEach(input => {
                        input.value = '';
                        input.classList.remove('filled', 'error');
                    });
                    if (otpInputs[0]) otpInputs[0].focus();
                    startTimer();

                    setTimeout(() => {
                        resendBtn.innerHTML = '<i class="fas fa-redo-alt mr-1.5"></i> Resend Code';
                        resendBtn.disabled = false;
                    }, 3000);
                }, 1500);
            });

            // ============================================================
            // FORM SUBMISSION
            // ============================================================
            otpForm.addEventListener('submit', function(e) {
                e.preventDefault();

                // Collect OTP
                let otp = '';
                let hasError = false;
                otpInputs.forEach((input, index) => {
                    const val = input.value.trim();
                    if (val === '') {
                        input.classList.add('error');
                        hasError = true;
                    } else {
                        input.classList.remove('error');
                        otp += val;
                    }
                });

                if (hasError) {
                    NotifPopup.error('Incomplete Code', 'Please enter all 6 characters of the verification code.',
                        'Just now');
                    // Focus first empty input
                    for (let input of otpInputs) {
                        if (input.value.trim() === '') {
                            input.focus();
                            break;
                        }
                    }
                    return;
                }

                // Validate alphanumeric
                if (!/^[A-Z0-9]{6}$/.test(otp)) {
                    NotifPopup.error('Invalid Code', 'Please enter a valid alphanumeric code.', 'Just now');
                    otpInputs.forEach(input => input.classList.add('error'));
                    if (otpInputs[0]) otpInputs[0].focus();
                    return;
                }

                verifyBtn.classList.add('loading');
                verifyBtn.disabled = true;

                // Simulate verification API call
                setTimeout(function() {
                    verifyBtn.classList.remove('loading');
                    verifyBtn.disabled = false;

                    // Simulate successful verification
                    NotifPopup.success('Email Verified! 🎉',
                        'Your email has been successfully verified. Redirecting to login...', 'Just now');

                    otpInputs.forEach(input => {
                        input.value = '';
                        input.classList.remove('filled', 'error');
                    });

                    setTimeout(function() {
                        window.location.href = '/auth/login/';
                    }, 2000);

                }, 1800);
            });

            // ============================================================
            // INIT
            // ============================================================
            Theme.init();
            startTimer();

            console.log('✅ Profynex OTP Verification Page — Clean dual-panel design with theme toggle.');
            console.log('🎨 Theme toggle: Active with proper dark/light styling');
            console.log('📱 Responsive: Adapts to all screen sizes');

        })();
    </script>

</body>
</html>
